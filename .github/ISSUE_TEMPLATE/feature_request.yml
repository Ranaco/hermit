name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What are you trying to do that you can't do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like. Include example CLI commands, API shapes, or UI sketches if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why do you prefer this one?
    validations:
      required: false

  - type: checkboxes
    id: affected
    attributes:
      label: Affected Component(s)
      options:
        - label: CLI (`@hermit-kms/cli`)
        - label: API (`apps/api`)
        - label: vault-client (`packages/vault-client`)
        - label: Documentation
        - label: Other
