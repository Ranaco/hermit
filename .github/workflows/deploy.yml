name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  build-images:
    name: Build and Push Images
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            image: ghcr.io/ranaco/hermit-api
            context: .
            dockerfile: ./apps/api/Dockerfile
          - service: web
            image: ghcr.io/ranaco/hermit-web
            context: .
            dockerfile: ./apps/web/Dockerfile
          - service: hcv
            image: ghcr.io/ranaco/hermit-hcv
            context: ./apps/hcv_engine
            dockerfile: ./apps/hcv_engine/Dockerfile

    steps:
      - name: Checkout the exact commit that passed CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.event.workflow_run.head_sha }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Deploy release
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail && \
            cd /deploy/hermit && \
            printf 'IMAGE_TAG=%s\n' '${{ github.event.workflow_run.head_sha }}' > .env.release && \
            touch .env.runtime && chmod 600 .env.runtime && \
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin && \
            docker compose --env-file .env.production --env-file .env.release -f docker-compose.deploy.yml pull && \
            docker compose --env-file .env.production --env-file .env.release -f docker-compose.deploy.yml up -d db hcv && \
            vault_status="$(docker compose --env-file .env.production --env-file .env.release -f docker-compose.deploy.yml exec -T hcv vault status -format=json 2>/dev/null || true)" && \
            if [ -z "$vault_status" ]; then
              echo "Unable to query Vault status after startup" >&2
              exit 1
            fi
            if ! printf '%s' "$vault_status" | jq -e '.initialized == true' >/dev/null; then
              echo "Vault is not initialized. Run operator bootstrap on the VPS before automatic deployments continue." >&2
              exit 1
            fi
            if printf '%s' "$vault_status" | jq -e '.sealed == true' >/dev/null; then
              echo "Vault is sealed. Unseal it or enable auto-unseal before automatic deployments continue." >&2
              exit 1
            fi
            bash ./deploy.sh --refresh-runtime-vault-env && \
            docker compose --env-file .env.production --env-file .env.release -f docker-compose.deploy.yml up -d --force-recreate --no-deps api web && \
            docker compose --env-file .env.production --env-file .env.release -f docker-compose.deploy.yml exec -T nginx nginx -s reload || docker compose --env-file .env.production --env-file .env.release -f docker-compose.deploy.yml up -d --force-recreate --no-deps nginx && \
            docker compose --env-file .env.production --env-file .env.release -f docker-compose.deploy.yml exec -T api npx prisma migrate deploy --schema=/app/packages/prisma/schema.prisma && \
            docker compose --env-file .env.production --env-file .env.release -f docker-compose.deploy.yml up -d certbot && \
            curl -fsS http://127.0.0.1/health > /dev/null && \
            docker compose --env-file .env.production --env-file .env.release -f docker-compose.deploy.yml ps && \
            docker image prune -f
