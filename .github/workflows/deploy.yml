name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  build-images:
    name: Build and Push Images
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            image: ghcr.io/ranaco/hermit-api
            context: .
            dockerfile: ./apps/api/Dockerfile
          - service: web
            image: ghcr.io/ranaco/hermit-web
            context: .
            dockerfile: ./apps/web/Dockerfile
          - service: docs
            image: ghcr.io/ranaco/hermit-docs
            context: .
            dockerfile: ./apps/docs/Dockerfile
          - service: hcv
            image: ghcr.io/ranaco/hermit-hcv
            context: ./apps/hcv_engine
            dockerfile: ./apps/hcv_engine/Dockerfile

    steps:
      - name: Checkout the exact commit that passed CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.event.workflow_run.head_sha || github.sha }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Deploy release
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /deploy/hermit

            image_tag='${{ github.event.workflow_run.head_sha || github.sha }}'
            compose_args=(--env-file .env.production --env-file .env.release -f docker-compose.deploy.yml)
            vault_status=""

            printf 'IMAGE_TAG=%s\n' "$image_tag" > .env.release
            touch .env.runtime
            chmod 600 .env.runtime

            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            vault_status_attempts=0
            hcv_container_id="$(docker compose "${compose_args[@]}" ps -q hcv || true)"

            pull_attempts=0
            until docker compose "${compose_args[@]}" pull api web docs; do
              pull_attempts=$((pull_attempts + 1))
              if [ "$pull_attempts" -ge 3 ]; then
                echo "Docker pull failed after ${pull_attempts} attempts." >&2
                docker info >&2 || true
                docker system df >&2 || true
                exit 1
              fi
              echo "Docker pull failed; retrying in 5 seconds (attempt $((pull_attempts + 1))/3)..." >&2
              sleep 5
            done

            docker compose "${compose_args[@]}" up -d db
            if [ -z "$hcv_container_id" ]; then
              docker compose "${compose_args[@]}" up -d hcv
            fi

            until vault_status="$(docker compose "${compose_args[@]}" exec -T hcv vault status -format=json 2>/dev/null || true)"; [ -n "$vault_status" ]; do
              vault_status_attempts=$((vault_status_attempts + 1))
              if [ "$vault_status_attempts" -ge 24 ]; then
                echo "Unable to query Vault status after startup" >&2
                docker compose "${compose_args[@]}" logs --tail=100 hcv >&2 || true
                exit 1
              fi
              sleep 5
            done

            if [ -z "$vault_status" ]; then
              echo "Unable to query Vault status after startup" >&2
              exit 1
            fi
            if ! printf '%s' "$vault_status" | jq -e '.initialized == true' >/dev/null; then
              echo "Vault is not initialized. Run operator bootstrap on the VPS before automatic deployments continue." >&2
              exit 1
            fi
            if printf '%s' "$vault_status" | jq -e '.sealed == true' >/dev/null; then
              echo "Vault is sealed. Unseal it or enable auto-unseal before automatic deployments continue." >&2
              exit 1
            fi

            bash ./deploy.sh --refresh-runtime-vault-env
            docker compose "${compose_args[@]}" up -d --force-recreate --no-deps api
            api_container_id="$(docker compose "${compose_args[@]}" ps -q api)"
            if [ -z "$api_container_id" ]; then
              echo "API container was not created." >&2
              exit 1
            fi

            api_wait_attempts=0
            until [ "$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$api_container_id")" = "healthy" ]; do
              api_wait_attempts=$((api_wait_attempts + 1))
              if [ "$api_wait_attempts" -ge 24 ]; then
                echo "API container did not become healthy in time." >&2
                docker compose "${compose_args[@]}" logs --tail=200 api >&2 || true
                exit 1
              fi
              sleep 5
            done

            docker compose "${compose_args[@]}" up -d --force-recreate --no-deps web docs
            docker compose "${compose_args[@]}" exec -T nginx nginx -s reload || docker compose "${compose_args[@]}" up -d --force-recreate --no-deps nginx
            docker compose "${compose_args[@]}" exec -T api npx prisma migrate deploy --schema=/app/packages/prisma/schema.prisma
            docker compose "${compose_args[@]}" up -d certbot

            health_attempts=0
            until curl -kfsS https://127.0.0.1/health > /dev/null; do
              health_attempts=$((health_attempts + 1))
              if [ "$health_attempts" -ge 12 ]; then
                echo "HTTPS health check did not succeed in time." >&2
                docker compose "${compose_args[@]}" ps >&2 || true
                docker compose "${compose_args[@]}" logs --tail=100 api web nginx >&2 || true
                exit 1
              fi
              sleep 5
            done

            docker compose "${compose_args[@]}" ps
            docker image prune -f
