services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hermit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hermit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  hcv:
    image: ghcr.io/ranaco/hermit-hcv:${HCV_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ENV: production
      VAULT_ADDR: https://127.0.0.1:8200
      VAULT_SKIP_VERIFY: ${VAULT_SKIP_VERIFY:-false}
      VAULT_CACERT: /vault/tls/ca.pem
      VAULT_NODE_ID: ${VAULT_NODE_ID:-node01}
      VAULT_API_ADDR: ${VAULT_API_ADDR:-https://hcv:8200}
      VAULT_CLUSTER_ADDR: ${VAULT_CLUSTER_ADDR:-https://hcv:8201}
      VAULT_LOG_LEVEL: ${VAULT_LOG_LEVEL:-info}
      VAULT_TLS_DISABLE: ${VAULT_TLS_DISABLE:-false}
      VAULT_TLS_DISABLE_NUMERIC: ${VAULT_TLS_DISABLE_NUMERIC:-0}
      VAULT_TLS_CERT_FILE: /vault/tls/tls.crt
      VAULT_TLS_KEY_FILE: /vault/tls/tls.key
      VAULT_TLS_CA_FILE: /vault/tls/ca.pem
      VAULT_AUTO_UNSEAL_TYPE: ${VAULT_AUTO_UNSEAL_TYPE:-}
      VAULT_AWSKMS_REGION: ${VAULT_AWSKMS_REGION:-}
      VAULT_AWSKMS_KMS_KEY_ID: ${VAULT_AWSKMS_KMS_KEY_ID:-}
      VAULT_AWSKMS_ENDPOINT: ${VAULT_AWSKMS_ENDPOINT:-}
    volumes:
      - vault_data:/etc/hashicorp_vault/raft_storage
      - ./vault/tls:/vault/tls:ro
      - ./vault/init:/vault/init
      - ./vault/backups:/vault/backups
      - ./vault/audit:/vault/audit
    networks:
      - hermit
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://127.0.0.1:8200/v1/sys/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
      - .env.runtime
    environment:
      NODE_ENV: production
      PORT: 5001
      VAULT_ENDPOINT: https://hcv:8200
      NODE_EXTRA_CA_CERTS: /vault/tls/ca.pem
    depends_on:
      db:
        condition: service_healthy
      hcv:
        condition: service_started
    volumes:
      - ./vault/tls:/vault/tls:ro
    networks:
      - hermit
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5001/readyz',{headers:{'x-forwarded-for':'127.0.0.1','x-ssl-client-verify':'SUCCESS'}}).then(async r=>{if(r.status!==200)throw new Error(await r.text())})",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hermit

  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - hermit

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - hermit

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  vault_data:
  certbot_www:
  certbot_conf:

networks:
  hermit:
    driver: bridge
